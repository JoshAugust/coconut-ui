<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="round">
      <rect width="512" height="512" rx="120" ry="120"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="120" ry="120" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="256" cy="256" rx="220" ry="220" fill="url(#glow)"/>

  <!-- Outer ring (glass effect) -->
  <circle cx="256" cy="256" r="195" stroke="url(#emerald)" stroke-width="1.5" fill="none" opacity="0.3"/>
  <circle cx="256" cy="256" r="178" stroke="url(#emerald)" stroke-width="0.75" fill="none" opacity="0.15"/>

  <!-- Node network — 3 orbital nodes with connecting lines -->
  <!-- Center node -->
  <circle cx="256" cy="256" r="28" fill="url(#emerald)" opacity="0.95"/>
  <circle cx="256" cy="256" r="36" stroke="url(#emerald)" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Top-left node -->
  <circle cx="150" cy="170" r="16" fill="url(#teal)" opacity="0.85"/>
  <circle cx="150" cy="170" r="22" stroke="url(#teal)" stroke-width="1.5" fill="none" opacity="0.35"/>

  <!-- Top-right node -->
  <circle cx="362" cy="170" r="16" fill="url(#emerald)" opacity="0.85"/>
  <circle cx="362" cy="170" r="22" stroke="url(#emerald)" stroke-width="1.5" fill="none" opacity="0.35"/>

  <!-- Bottom node -->
  <circle cx="256" cy="370" r="16" fill="url(#teal)" opacity="0.85"/>
  <circle cx="256" cy="370" r="22" stroke="url(#teal)" stroke-width="1.5" fill="none" opacity="0.35"/>

  <!-- Connecting lines (gradient, semi-transparent) -->
  <line x1="166" y1="178" x2="237" y2="244" stroke="url(#emerald)" stroke-width="2" opacity="0.5"/>
  <line x1="346" y1="178" x2="275" y2="244" stroke="url(#emerald)" stroke-width="2" opacity="0.5"/>
  <line x1="256" y1="284" x2="256" y2="353" stroke="url(#teal)" stroke-width="2" opacity="0.5"/>

  <!-- Outer orbital dots -->
  <circle cx="256" cy="75" r="5" fill="#34d399" opacity="0.6"/>
  <circle cx="420" cy="160" r="4" fill="#22d3ee" opacity="0.5"/>
  <circle cx="420" cy="352" r="4" fill="#34d399" opacity="0.5"/>
  <circle cx="256" cy="437" r="5" fill="#22d3ee" opacity="0.6"/>
  <circle cx="92" cy="352" r="4" fill="#34d399" opacity="0.5"/>
  <circle cx="92" cy="160" r="4" fill="#22d3ee" opacity="0.5"/>

  <!-- Rim / border glow -->
  <rect width="512" height="512" rx="120" ry="120" fill="none" stroke="url(#emerald)" stroke-width="2" opacity="0.2"/>
</svg>
